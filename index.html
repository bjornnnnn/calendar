<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
    <script src="calendar.js"></script>
    <style type="text/css">
        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: #666666;
            background-color: #EEEEEE;
        }

        #headDiv {
            position: fixed;
            width: 100%;
            top: 0px;
            left: 0px;
            background-color: #AAAAAAAA;
            color: #000;
            backdrop-filter: blur(2px);
        }

        #caldiv {
            display: block;
            margin-top: 100px;

        }

        .calday {
            border-bottom: 0.5px solid #FFFFFF;
            display: flex;
            padding: 5px;
        }

        .calday:hover {
            background-color: #f8f8f8;
            color: #222222;
            cursor: pointer;
        }

        .doy {
            display: flex;
            padding: 5px;
            width: 10px;
            flex-direction: row-reverse;
            font-size: smaller;
            color: #DDDDDD;
            left: 7px;
            position: absolute;
        }

        .doy:hover {
            display: flex;
            padding: 5px;
            width: 10px;
            flex-direction: row-reverse;
            font-size: smaller;
            color: #666666;
        }

        .day {
            display: flex;
            padding: 5px;
            width: 100px;
        }

        .firstOfWeek {
            border-top: 2px dotted #CCCCCC;
        }

        .firstOfMonth {
            border-top: 2px dashed #CCCCCC;
        }


        .date {
            display: flex;
            padding: 5px;
            width: 20px;
            flex-direction: row-reverse;
        }

        .month {
            display: flex;
            padding: 5px;
            /*width: 80px;*/
            min-width: 50px;
            flex-direction: row-reverse;
        }

        .event {
            display: flex;
            border: 1px solid #CCCCCC;
            background-color: #DDDDDD;
            padding: 5px;
            min-width: 75px;
            border-radius: 5px;
        }

        .event:hover {
            background-color: #FFFFFF;
        }

        .nssEvent {
            border-left: 6px solid blue;
        }

        .externalEvent {
            border-left: 6px solid #888888;
        }

        .eventlist {
            display: flex;
            padding: 5px;
        }

        .monthNavMonth {
            display: inline-flex;
            padding: 5px;
            text-decoration: none;
            border: 1px solid "#AAAAAA";
            color: #000;
        }

        .monthNavMonth:hover {

            border-bottom: 2px solid #999999;
        }

        .weeknumber {
            display: flex;
            background-color: #EEEEEE;
            position: absolute;
            border: 1px solid #AAAAAA;
            height: 10px;
            border-radius: 10px;
            margin-top: -13px;
            left: 7px;
            font-size: x-small;
            padding: 3px;
        }
    </style>
</head>

<body>
    <div id="headDiv">
        <h3>Nynäshamns Segelsällskap Seglingskalender 2026</h3>
        <span id="monthsnav"></span>
    </div>
    <div id="caldiv">
        <!-- Days will be generated here. -->
    </div>
    <script>
        let caldiv = document.getElementById("caldiv")

        for (var i = 1; i < 366; i++) {
            caldiv.appendChild(makeDayBrick(generateDay(years[0], events, i)))
        }

    </script>
</body>

</html>
