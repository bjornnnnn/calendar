<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
    <script src="calendar.js"></script>
    <style type="text/css">
        body {font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color: #666666;
        background-color: #EEEEEE;}
        
        #headDiv {
            position:fixed;
            width: 100%;
            top: 0px;
            left: 0px;
            background-color: #AAAAAAAA;
            color: #000;
            backdrop-filter: blur(2px);
        }
        
        .calday {
            border-bottom: 0.5px solid #FFFFFF;
            display: flex;
            padding: 5px;
        }
        .calday:hover {
            background-color: #effff3;
            color: #222222;
            cursor: pointer;
        }
        .doy { display: flex; padding: 5px; width: 10px; flex-direction: row-reverse;font-size: smaller; color:#DDDDDD;}
        .doy:hover { display: flex; padding: 5px; width: 10px; flex-direction: row-reverse;font-size: smaller; color:#666666;}
        .day { display: flex; padding: 5px;}
        .firstOfMonth {border-top: 2px dashed #CCCCCC;}
        .date {display: flex; padding: 5px; width: 20px; flex-direction: row-reverse;}
        .month{display: flex; padding: 5px; width: 80px; flex-direction: row-reverse;}

        .event {display: flex;
            border: 1px solid #CCCCCC; 
            background-color: #DDDDDD;
            padding: 5px; 
            width: 200px;
            border-radius: 5px;
        }

        .event:hover {background-color: #FFFFFF;}
    </style>
</head>
<body>
    <div id="headDiv">
        <h3>Nynäshamns Segelsällskap Jolle Kalender 2026</h3>
    </div>
    <div id="caldiv">
        <!-- Days will be generated here. -->
    </div>
    <script>
        let caldiv = document.getElementById("caldiv")
        
        for (var i = 1; i < 360; i++){
            caldiv.appendChild(makeDayBrick(generateDay(years[0],events, i)))
        }
        
    </script>
</body>
</html>
