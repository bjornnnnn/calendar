<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
    <script src="calendar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!--script src="supabase.js"></script-->

    <style type="text/css">
        :root {
            --gr0: #000000;
            --gr2: #222222;
            --gr6: #666666;
            --gr10: #AAAAAA;
            --gr12: #CCCCCC;
            --gr13: #DDDDDD;
            --gr14: #EEEEEE;
        }

        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: #666666;
            background-color: #EEEEEE;
        }

        #headDiv {
            position: fixed;
            padding: 5px;
            width: 100%;
            top: 0px;
            left: 0px;
            background-color: #AAAAAAAA;
            color: #000;
            backdrop-filter: blur(2px);
        }

        #caldiv {
            display: block;
            margin-top: 100px;

        }

        .calday {
            border-bottom: 0.5px solid #FFFFFF;
            display: flex;
            padding: 5px;
        }

        .calday:hover {
            background-color: #f8f8f8;
            color: #222222;
            cursor: pointer;
        }

        .doy {
            display: flex;
            padding: 5px;
            width: 10px;
            flex-direction: row-reverse;
            font-size: smaller;
            color: #DDDDDD;
            left: 7px;
            position: absolute;
        }

        .doy:hover {
            display: flex;
            padding: 5px;
            width: 10px;
            flex-direction: row-reverse;
            font-size: smaller;
            color: #666666;
        }

        .day {
            display: flex;
            padding: 5px;
            width: 100px;
        }

        .firstOfWeek {
            border-top: 2px dotted #CCCCCC;
        }

        .firstOfMonth {
            border-top: 2px dashed #CCCCCC;
        }


        .date {
            display: flex;
            padding: 5px;
            width: 20px;
            flex-direction: row-reverse;
        }

        .month {
            display: flex;
            padding: 5px;
            /*width: 80px;*/
            min-width: 50px;
            flex-direction: row-reverse;
        }

        .event {
            display: flex;
            border: 1px solid #CCCCCC;
            background-color: #DDDDDD;
            padding: 5px;
            min-width: 75px;
            border-radius: 5px;
        }

        .event:hover {
            background-color: #FFFFFF;
        }

        .nssEvent {
            border-left: 6px solid blue;
        }

        .externalEvent {
            border-left: 6px solid #888888;
        }

        .eventlist {
            display: flex;
            padding: 5px;
        }

        .monthNavMonth {
            display: inline-flex;
            padding: 5px;
            text-decoration: none;
            border: 1px solid "#AAAAAA";
            color: #000;
        }

        .monthNavMonth:hover {

            border-bottom: 2px solid #999999;
        }

        .weeknumber {
            display: flex;
            background-color: #EEEEEE;
            position: absolute;
            border: 1px solid #AAAAAA;
            height: 10px;
            border-radius: 10px;
            margin-top: -13px;
            left: 7px;
            font-size: x-small;
            padding: 3px;
        }

        /* The Modal (background) */
        .modal {
            display: block;
            /* Hidden by default */
            position: fixed;
            /* Stay in place */
            z-index: 1;
            /* Sit on top */
            left: 0;
            top: 0;
            width: 100%;
            /* Full width */
            height: 100%;
            /* Full height */
            overflow: auto;
            /* Enable scroll if needed */
            background-color: rgb(0, 0, 0);
            /* Fallback color */
            background-color: rgba(0, 0, 0, 0.4);
            /* Black w/ opacity */
        }

        .modal-content {
            background-color: #EEEEEE;
            margin: 15% auto;
            /* 15% from the top and centered */
            padding: 20px;
            border: 3px solid #FFFFFF;
            width: 80%;
            /* Could be more or less, depending on screen size */
        }

        .hidden {
            display: none;
        }

        .participantCountCls {
            display: inline-flex;
            background-color: #ffffff;
            overflow: hidden;
            border-radius: 20px;
            width: 10%;
            height: 25px;
            min-width: 85px;
            padding: 5px;
            cursor: pointer;
            transition: width .5s ease;
        }
        .participantCountCls:hover {
            /*animation: 1s linear;*/
            width: 96%;
        }

        .modal-buttons label{
            margin: 5px;
        }

        .modal-buttons input{
            margin: 5px;
        }

        .modal-buttons {
            overflow: hidden;
            display: flex;
            background-color: var(--gr13);
            margin: 5px;
            padding: 5px;
        }

        .modal-buttons button {
            margin: 5px;
        }

        .participantCounter {
            display: flex;
            padding:3px;
        }

        .participantlabel {
            display:none;
            background-color: #00000000;
            color: var(--gr14);
            margin-left: 3px;
            padding: 3px;
            padding-left:7px;
            padding-right: 7px;
            border-radius: 13px;
            transition: background-color 1s ease;

        }
        
        .participantCountCls:hover .participantlabel {
            display: flex;
            background-color: #CCCCCC;
        }

        .participantlabel:hover{
            background-color: red;
        }
    </style>
</head>

<body>
    <div id="headDiv">
        <h3>Nynäshamns Segelsällskap Seglingskalender 2026</h3>
        <span id="monthsnav"></span>
    </div>
    
    <div id="caldiv">
        <!-- Days will be generated here. -->
    </div>

    <div id="modal" class="modal hidden">
        <div id="modal-content" class="modal-content">

        </div>
    </div>

    <script src="db.js"></script>
    <script>
        
        let caldiv = document.getElementById("caldiv")

        for (var i = 1; i < 366; i++) {
            caldiv.appendChild(makeDayBrick(generateDay(years[0], events, i)))
        }

    </script>
</body>

</html>
